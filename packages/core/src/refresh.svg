<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 外圆圈 -->
  <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- 内部刷新箭头 -->
  <g transform="translate(12, 12)">
    <!-- 上方箭头 -->
    <path d="M 0 -6 L -2 -2 L 2 -2 Z" fill="white" opacity="0.9"/>
    
    <!-- 右侧弧线 -->
    <path d="M 5 -3 Q 7 0 6 4" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    
    <!-- 左侧弧线 -->
    <path d="M -5 3 Q -7 0 -6 -4" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    
    <!-- 旋转圈 -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="white" stroke-width="1" opacity="0.2" stroke-dasharray="4 2"/>
  </g>
  
  <!-- 中心圆点 -->
  <circle cx="12" cy="12" r="1.5" fill="white" opacity="0.6"/>
</svg>
